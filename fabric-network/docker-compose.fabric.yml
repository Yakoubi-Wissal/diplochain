# =============================================================================
# DiploChain — docker-compose.fabric.yml
# Fabric 2.5 | Orderer + Peer + CouchDB (state DB) + CA
# Réseau Docker interne : diplochain-net (partagé avec les microservices)
# =============================================================================

version: '3.8'

networks:
  diplochain-net:
    name: diplochain-net
    driver: bridge

volumes:
  orderer.diplochain.local:
  peer0.diplochain.local:
  couchdb0:
  fabric-ca:

services:

  # ===========================================================================
  # Certificate Authority
  # ===========================================================================
  fabric-ca:
    image: hyperledger/fabric-ca:1.5
    container_name: fabric-ca.diplochain.local
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.diplochain.local
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_CA_CERTFILE=/etc/hyperledger/fabric-ca-server-config/ca.diplochain.local-cert.pem
      - FABRIC_CA_SERVER_CA_KEYFILE=/etc/hyperledger/fabric-ca-server-config/priv_sk
    ports:
      - "7054:7054"
    volumes:
      - ./crypto-config/peerOrganizations/diplochain.local/ca/:/etc/hyperledger/fabric-ca-server-config
      - fabric-ca:/etc/hyperledger/fabric-ca-server
    networks:
      - diplochain-net
    restart: unless-stopped

  # ===========================================================================
  # Orderer — Raft single node
  # ===========================================================================
  orderer.diplochain.local:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.diplochain.local
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=DiploChainOrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      # TLS
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Raft
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Bootstrap
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:8443
    ports:
      - "7050:7050"   # gRPC clients (blockchain-service)
      - "7053:7053"   # Admin API (osnadmin)
      - "8443:8443"   # Operations/health
    volumes:
      - ./crypto-config/ordererOrganizations/orderer.diplochain.local/orderers/orderer.orderer.diplochain.local/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/orderer.diplochain.local/orderers/orderer.orderer.diplochain.local/tls:/var/hyperledger/orderer/tls
      - orderer.diplochain.local:/var/hyperledger/production/orderer
    networks:
      - diplochain-net
    restart: unless-stopped

  # ===========================================================================
  # CouchDB — State database pour le chaincode (queryable par institution_id)
  # ===========================================================================
  couchdb0:
    image: couchdb:3.3.3
    container_name: couchdb0.diplochain.local
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-diplochain_couch_2025}
    ports:
      - "5984:5984"
    volumes:
      - couchdb0:/opt/couchdb/data
    networks:
      - diplochain-net
    restart: unless-stopped

  # ===========================================================================
  # Peer0 — DiploChainOrg
  # ===========================================================================
  peer0.diplochain.local:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.diplochain.local
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=diplochain-net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      # Identité
      - CORE_PEER_ID=peer0.diplochain.local
      - CORE_PEER_ADDRESS=peer0.diplochain.local:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.diplochain.local:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.diplochain.local:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.diplochain.local:7051
      - CORE_PEER_LOCALMSPID=DiploChainOrgMSP
      # CouchDB state DB
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0.diplochain.local:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD:-diplochain_couch_2025}
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9444
    ports:
      - "7051:7051"   # gRPC (blockchain-service)
      - "9444:9444"   # Operations/health
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/diplochain.local/peers/peer0.diplochain.local/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/diplochain.local/peers/peer0.diplochain.local/tls:/etc/hyperledger/fabric/tls
      - ./crypto-config/peerOrganizations/diplochain.local/users/Admin@diplochain.local/msp:/tmp/admin-msp
      - ./crypto-config/ordererOrganizations/orderer.diplochain.local/orderers/orderer.orderer.diplochain.local/tls/ca.crt:/tmp/orderer-ca.crt
      - peer0.diplochain.local:/var/hyperledger/production
    depends_on:
      - couchdb0
      - orderer.diplochain.local
    networks:
      - diplochain-net
    restart: unless-stopped
