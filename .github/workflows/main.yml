name: DiploChain CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install core testing tools
          pip install pytest pytest-asyncio pytest-env aiosqlite httpx fastapi sqlalchemy pydantic-settings email-validator "python-jose[cryptography]" bcrypt passlib python-multipart reportlab
          # Install dependencies for all V2 services
          for d in backend/app/v2/*/; do
            if [ -f "$d/requirements.txt" ]; then
              pip install -r "$d/requirements.txt"
            fi
          done
      - name: Run Backend Tests (ALL V2 Microservices)
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        run: |
          # Automatically detect and test every V2 service with a 'tests' folder
          for d in backend/app/v2/*; do
            if [ -d "$d/tests" ]; then
              echo "Testing service: $d"
              # Ensure standard imports by setting PYTHONPATH to service root and its 'app' directory
              export PYTHONPATH=$(pwd)/$d:$(pwd)/$d/app
              python -m pytest -o "asyncio_mode=auto" $d/tests
            fi
          done

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      - name: Build frontend
        run: |
          cd frontend
          npm run build

  docker-build:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker compose -f docker-compose.yml build
