name: DiploChain CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  discovery:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - id: set-services
        run: |
          SERVICES=$(find backend/app/v2 -maxdepth 2 -name "tests" -type d | cut -d'/' -f1-4 | sort -u | jq -R -s -c 'split("\n")[:-1]')
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  backend-test:
    needs: discovery
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.discovery.outputs.services) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd ${{ matrix.service }}
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx pytest-asyncio pytest-env aiosqlite sqlalchemy pydantic-settings email-validator python-jose[cryptography] bcrypt passlib python-multipart reportlab
      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          PYTHONPATH: .:${{ matrix.service }}:${{ matrix.service }}/app
        run: |
          cd ${{ matrix.service }}
          pytest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker compose -f docker-compose.yml build
