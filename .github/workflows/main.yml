name: DiploChain CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # We check one service as a representative sample
          cd backend/app/v2/user-service
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-env httpx aiosqlite pydantic-settings email-validator python-jose[cryptography]
      - name: Run tests
        run: |
          cd backend/app/v2/user-service
          export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/app
          pytest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd audit-dashboard
          npm install
      - name: Build frontend
        run: |
          cd audit-dashboard
          npm run build

  docker-build:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker compose -f docker-compose.v2.yml build
