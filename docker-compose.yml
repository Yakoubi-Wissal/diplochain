services:
  postgres:
    image: postgres:14.2
    container_name: diplochain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: diplochain_user
      POSTGRES_PASSWORD: diplochain_pass
      POSTGRES_DB: diplochain_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U diplochain_user -d diplochain_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diplochain-network

  ipfs-node:
    image: ipfs/kubo:latest
    container_name: diplochain_ipfs
    ports:
      - "8080:8080"
      - "5001:5001"
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - diplochain-network

  fabric-gateway:
    image: hyperledger/fabric-peer:latest
    container_name: diplochain_fabric
    ports:
      - "7051:7051"
    networks:
      - diplochain-network

  # V2 Microservices
  api-gateway:
    build: ./backend/app/v2/api-gateway
    container_name: diplochain_v2_api_gateway
    ports:
      - "8000:8000"
    networks:
      - diplochain-network
    volumes:
      - ./backend/app/v2/api-gateway/app:/app
    environment:
      - JWT_SECRET_KEY=your-secret-key-change-in-production
      - JWT_ALGORITHM=HS256
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:8000
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()" ]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      user-service:
        condition: service_healthy
      institution-service:
        condition: service_healthy
      student-service:
        condition: service_healthy
      diploma-service:
        condition: service_healthy
      document-service:
        condition: service_healthy
      blockchain-service:
        condition: service_healthy
      storage-service:
        condition: service_healthy
      verification-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      admin-dashboard-service:
        condition: service_healthy
      entreprise-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      pdf-generator-service:
        condition: service_healthy
      qr-validation-service:
        condition: service_healthy

  frontend:
    build: ./audit-dashboard
    container_name: diplochain_v2_frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - diplochain-network

  user-service:
    build: ./backend/app/v2/user-service
    container_name: diplochain_v2_user
    environment:
      - DATABASE_URL=postgresql+asyncpg://diplochain_user:diplochain_pass@postgres/diplochain_db
    networks:
      - diplochain-network
    volumes:
      - ./backend/app/v2/user-service/app:/app
      - ./backend/app/v2/user-service/tests:/app/tests
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()" ]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  institution-service:
