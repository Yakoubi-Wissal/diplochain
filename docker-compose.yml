services:

  postgres:
    image: postgres:14.2
    container_name: diplochain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: diplochain_user
      POSTGRES_PASSWORD: diplochain_pass
      POSTGRES_DB: diplochain_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U diplochain_user -d diplochain_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diplochain-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: diplochain_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@diplochain.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - diplochain-network

  ipfs-node:
    image: ipfs/kubo:latest
    container_name: diplochain_ipfs
    ports:
      - "8080:8080"
      - "5001:5001"
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - diplochain-network

  fabric-gateway:
    image: hyperledger/fabric-peer:latest
    container_name: diplochain_fabric
    ports:
      - "7051:7051"
    networks:
      - diplochain-network

  backend:
    build: ./backend
    container_name: diplochain_backend
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://diplochain_user:diplochain_pass@postgres:5432/diplochain_db
      - SECRET_KEY=changeme
      - ALLOWED_ORIGINS=http://localhost:3000
      - FABRIC_STUB_MODE=true
      - IPFS_HOST=ipfs-node
      - IPFS_PORT=5001
    volumes:
      - ./backend:/app
    networks:
      - diplochain-network
    depends_on:
      - postgres
      - ipfs-node
      - fabric-gateway

  api-gateway:
    build: ./backend/app/v2/api-gateway
    container_name: diplochain_api_gateway
    working_dir: /app
    ports:
      - "8001:8000"
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://diplochain_user:diplochain_pass@postgres:5432/diplochain_db
    volumes:
      - ./backend/app/v2/api-gateway/app:/app
    networks:
      - diplochain-network
    depends_on:
      - user-service
      - institution-service
      - student-service
      - diploma-service
      - document-service
      - blockchain-service
      - storage-service
      - verification-service
      - analytics-service

  retry-worker-service:
    build: ./backend/app/v2/retry-worker-service
    container_name: diplochain_v2_retry_worker
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://diplochain_user:diplochain_pass@postgres:5432/diplochain_db
    volumes:
      - ./backend/app/v2/retry-worker-service/app:/app
    networks:
      - diplochain-network

  user-service:
    build: ./backend/app/v2/user-service
    container_name: diplochain_v2_user
    working_dir: /app
    ports:
      - "8100:8000"
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://diplochain_user:diplochain_pass@postgres:5432/diplochain_db
    volumes:
      - ./backend/app/v2/user-service/app:/app
    networks:
      - diplochain-network
    depends_on:
      - postgres

  institution-service:
    build: ./backend/app/v2/institution-service
    container_name: diplochain_v2_institution
    working_dir: /app
    ports:
      - "8200:8000"
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://diplochain_user:diplochain_pass@postgres:5432/diplochain_db
    volumes:
      - ./backend/app/v2/institution-service/app:/app
    networks:
      - diplochain-network
    depends_on:
      - postgres

  student-service:
    build: ./backend/app/v2/student-service
    container_name: diplochain_v2_student
    working_dir: /app
    ports:
      - "8300:8000"
    environment:
