    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://diplochain_user:diplochain_pass@postgres:5432/diplochain_db
      - FABRIC_GATEWAY_HOST=fabric-gateway
      - FABRIC_GATEWAY_PORT=7051
    volumes:
      - ./backend/app/v2/blockchain-service/app:/app
    networks:
