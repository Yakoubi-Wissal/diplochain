  document-service:
    build: ./backend/app/v2/document-service
    container_name: diplochain_v2_document
    working_dir: /app
    ports:
      - "8500:8000"
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://diplochain_user:diplochain_pass@postgres:5432/diplochain_db
    volumes:
      - ./backend/app/v2/document-service/app:/app
    networks:
      - diplochain-network
