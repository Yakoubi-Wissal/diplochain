services:
  postgres:
    image: postgres:14.2
    container_name: diplochain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: diplochain_user
      POSTGRES_PASSWORD: diplochain_pass
      POSTGRES_DB: diplochain_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U diplochain_user -d diplochain_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diplochain-network

  ipfs-node:
    image: ipfs/kubo:release
    container_name: diplochain_ipfs
    ports:
      - "8080:8080"
      - "5001:5001"
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - diplochain-network
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      retries: 5

  # ===========================================================================
  # Hyperledger Fabric Infrastructure
  # ===========================================================================

  # Certificate Authority
  fabric-ca:
    image: hyperledger/fabric-ca:1.5
    container_name: fabric-ca.diplochain.local
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.diplochain.local
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_CA_CERTFILE=/etc/hyperledger/fabric-ca-server-config/ca.diplochain.local-cert.pem
      - FABRIC_CA_SERVER_CA_KEYFILE=/etc/hyperledger/fabric-ca-server-config/priv_sk
    ports:
      - "7054:7054"
    volumes:
      - ./fabric-network/crypto-config/peerOrganizations/diplochain.local/ca/:/etc/hyperledger/fabric-ca-server-config
    networks:
      - diplochain-network
    restart: unless-stopped

  # Orderer — Raft single node
  orderer:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.diplochain.local
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=DiploChainOrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:8443
    ports:
      - "7050:7050"
      - "7053:7053"
      - "8443:8443"
    volumes:
      - ./fabric-network/crypto-config/ordererOrganizations/orderer.diplochain.local/orderers/orderer.orderer.diplochain.local/msp:/var/hyperledger/orderer/msp
      - ./fabric-network/crypto-config/ordererOrganizations/orderer.diplochain.local/orderers/orderer.orderer.diplochain.local/tls:/var/hyperledger/orderer/tls
    networks:
      - diplochain-network
    restart: unless-stopped

  # CouchDB — State database
  couchdb0:
    image: couchdb:3.3.3
    container_name: couchdb0.diplochain.local
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=diplochain_couch_2025
    ports:
      - "5984:5984"
    networks:
      - diplochain-network
    restart: unless-stopped

  # Peer0 — DiploChainOrg (Final Authority)
  peer0:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.diplochain.local
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=diplochain_diplochain-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.diplochain.local
      - CORE_PEER_ADDRESS=peer0.diplochain.local:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.diplochain.local:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.diplochain.local:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.diplochain.local:7051
      - CORE_PEER_LOCALMSPID=DiploChainOrgMSP
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=diplochain_couch_2025
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9444
    ports:
      - "7051:7051"
      - "9444:9444"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./fabric-network/crypto-config/peerOrganizations/diplochain.local/peers/peer0.diplochain.local/msp:/etc/hyperledger/fabric/msp
      - ./fabric-network/crypto-config/peerOrganizations/diplochain.local/peers/peer0.diplochain.local/tls:/etc/hyperledger/fabric/tls
      - ./fabric-network/crypto-config/peerOrganizations/diplochain.local/users/Admin@diplochain.local/msp:/tmp/admin-msp
      - ./fabric-network/crypto-config/ordererOrganizations/orderer.diplochain.local/orderers/orderer.orderer.diplochain.local/tls/ca.crt:/tmp/orderer-ca.crt
    depends_on:
      - couchdb0
      - orderer
    networks:
      - diplochain-network
    restart: unless-stopped

  # V2 Microservices
  api-gateway:
    build: ./backend/app/v2/api-gateway
    container_name: diplochain_v2_api_gateway
    ports:
      - "8000:8000"
    networks:
      - diplochain-network
    volumes:
      - ./backend/app/v2/api-gateway/app:/app
    environment:
      - JWT_SECRET_KEY=your-secret-key-change-in-production
      - JWT_ALGORITHM=HS256
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:8000
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()" ]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      user-service:
        condition: service_healthy
      institution-service:
        condition: service_healthy
      student-service:
        condition: service_healthy
      diploma-service:
        condition: service_healthy
      document-service:
        condition: service_healthy
      blockchain-service:
        condition: service_healthy
      storage-service:
        condition: service_healthy
      verification-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      admin-dashboard-service:
        condition: service_healthy
      entreprise-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      pdf-generator-service:
        condition: service_healthy
      qr-validation-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: diplochain_v2_frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - diplochain-network

  fabric-api-server:
    build: ./fabric-api-server
    container_name: diplochain_fabric_api
    ports:
      - "4001:4001"
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=diplochain_user
      - PG_PASSWORD=diplochain_pass
      - PG_DB=diplochain_db
      - ORDERER_ADDRESS=orderer.diplochain.local:7053
      - PEER_ADDRESS=peer0.diplochain.local:7051
      - COUCHDB_URL=http://admin:diplochain_couch_2025@couchdb0.diplochain.local:5984
      - FABRIC_NET_DIR=/fabric-network
    volumes:
      - ./fabric-network:/fabric-network
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      peer0:
        condition: service_started
    networks:
      - diplochain-network

  user-service:
    build: ./backend/app/v2/user-service
    container_name: diplochain_v2_user
    environment:
      - DATABASE_URL=postgresql+asyncpg://diplochain_user:diplochain_pass@postgres/diplochain_db
    networks:
      - diplochain-network
    volumes:
      - ./backend/app/v2/user-service/app:/app
      - ./backend/app/v2/user-service/tests:/app/tests
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()" ]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  institution-service:
